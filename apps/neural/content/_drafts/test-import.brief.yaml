seoTitle: "ROI projet IA : méthode de mesure pour les directions"
seoDescription: "Cadre concret pour mesurer le retour sur investissement d'un projet IA en entreprise : indicateurs, pièges et exemples chiffrés."
targetWordCount: 1200
styleGuide: "Analytique, sourcé, orienté praticien. Ton direct, pas de promesses génériques. Chiffres et exemples concrets privilégiés."
constraints:
  - "Inclure au moins un StatBlock avec le chiffre 72% McKinsey"
  - "Inclure au moins un Callout sur la différence gains directs vs indirects"
  - "Citer chaque source au moins une fois dans le corps de l'article"
plan:
  - section: "Pourquoi la mesure du ROI IA est difficile"
    points:
      - "Les bénéfices IA sont souvent diffus et décalés dans le temps"
      - "Le périmètre change au fur et à mesure que les équipes adoptent l'outil"
      - "Le coût total inclut formation, maintenance, et supervision humaine — souvent sous-estimés"
  - section: "Les trois catégories de valeur à mesurer"
    points:
      - "Gains directs : temps économisé, volume traité, coût opérationnel réduit"
      - "Gains indirects : qualité augmentée, erreurs évitées, satisfaction collaborateur"
      - "Valeur stratégique : capacité nouvelle, compétence interne développée, avantage concurrentiel"
  - section: "Une méthode de mesure en 4 étapes"
    points:
      - "Étape 1 : définir la baseline avant déploiement (temps, coût, qualité actuels)"
      - "Étape 2 : identifier les indicateurs de succès par cas d'usage"
      - "Étape 3 : mesurer à J+30, J+90, J+180 avec le même protocole"
      - "Étape 4 : distinguer l'effet IA de l'effet formation/changement organisationnel"
  - section: "Les erreurs les plus courantes"
    points:
      - "Compter uniquement les heures économisées sans valider que le temps est réalloué"
      - "Ignorer le coût de supervision (validation humaine reste nécessaire)"
      - "Projeter le POC sur 100% du flux sans tenir compte de la variance des cas"
sources:
  - title: "McKinsey — The state of AI in 2025"
