  <text x="122" y="246" fill="white" font-family="Space Grotesk, Arial, sans-serif" font-size="62" font-weight="700">Le framework NEURAL en 5 étapes</text>
  <text x="122" y="308" fill="#90A4C3" font-family="Inter, Arial, sans-serif" font-size="25">Chaque étape retire une incertitude différente avant le passage à l'échelle.</text>
