name: E2E Tests

on:
  push:
    branches: [master]
    paths:
      - "apps/carbon/**"
      - ".github/workflows/e2e.yml"
  # Manuel pour lancer sur PR si besoin
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/carbon

    env:
      E2E_BASE_URL: http://localhost:3003
      E2E_API_URL: ${{ secrets.E2E_API_URL }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      # Variables Upstash — fail-open si absentes (rate limit désactivé en CI)
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/carbon/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build Next.js
        run: npm run build
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}

      - name: Start Next.js server
        run: npm run start -- --port 3003 &
        env:
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}

      - name: Wait for server
        run: npx wait-on http://localhost:3003 --timeout 30000

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/carbon/playwright-report/
          retention-days: 7
