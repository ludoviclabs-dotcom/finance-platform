name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check . --select=E,F,I --ignore=E501

      - name: Verify FastAPI app loads (all routers)
        run: |
          python -c "
          from main import app
          routes = [r.path for r in app.routes]
          print(f'OK: app loaded with {len(routes)} routes')
          # Verify key route prefixes are registered
          prefixes = {'/health', '/auth', '/excel', '/report', '/clients',
                      '/entreprise', '/cyber', '/pilier2', '/creditrisk',
                      '/carbon', '/vsme', '/esg', '/finance', '/ingest'}
          for p in prefixes:
              assert any(p in r for r in routes), f'Missing route prefix: {p}'
          print(f'OK: all {len(prefixes)} route prefixes verified')
          "

      - name: Verify models import
        run: |
          python -c "from models.ma import MAInput, MAOutput; print('OK: models loaded')"

      - name: Verify services import
        run: |
          python -c "
          from services.ma_service import analyze_ma
          from services.cyber_service import analyze_cyber
          from services.pilier2_service import analyze_pilier2
          from services.creditrisk_service import analyze_creditrisk
          from services.entreprise_service import analyze_entreprise
          print('OK: all services loaded')
          "

  # Job séparé : pytest + Block A indépendants du lint (T1.8).
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Tests (pytest — mode /tmp, sans Neon)
        run: pytest -q
      - name: Block A — validation des classeurs masters
        run: python ../../scripts/carbonco/validate_block_a_workbooks.py --root data

  # Job séparé : tests PostgreSQL du ledger de migrations (PR-02B), contre un
  # conteneur postgres:16 jetable — jamais Neon. Même pattern de service que
  # backup.yml::restore-check (déjà en place). Le job `tests` ci-dessus reste
  # inchangé (mode /tmp, sans DB) et continue de couvrir le reste de la suite.
  migration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Tests PostgreSQL — ledger de migrations (PR-02B)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: pytest -q tests/test_migration_probes.py tests/test_migration_ledger.py

  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (high+critical bloquant)
        # PYSEC-2026-1325 (ecdsa 0.19.2) — ignoré avec justification (2026-07-17) :
        #  - dépendance transitive via python-jose[cryptography], jamais déclarée
        #    directement dans requirements.txt ;
        #  - aucune version corrective publiée (colonne "Fix Versions" vide) ;
        #  - canal auxiliaire temporel sur des opérations ECDSA. L'app signe ses JWT
        #    en HS256 uniquement (services/auth_service.py) → le chemin ECDSA n'est
        #    jamais exercé ; plateforme locale-first, sans exposition réseau au runtime.
        #  À retirer si un correctif ecdsa paraît, ou lors d'une migration python-jose → PyJWT.
        run: pip-audit -r requirements.txt --strict --ignore-vuln PYSEC-2026-1325
