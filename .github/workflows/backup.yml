name: DB backup (Neon)

# Sauvegarde quotidienne chiffrée de Neon (T1.8) + vérification de restauration
# reproductible en CI. Skip gracieux si les secrets sont absents.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *" # 03:00 UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Guard (secrets présents ?)
        id: guard
        run: |
          if [ -z "${{ secrets.NEON_DATABASE_URL }}" ] || [ -z "${{ secrets.BACKUP_PASSPHRASE }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "NEON_DATABASE_URL / BACKUP_PASSPHRASE absents — sauvegarde ignorée."
          fi
      - name: Install postgresql-client
        if: steps.guard.outputs.skip != 'true'
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: pg_dump + chiffrement GPG (AES256)
        if: steps.guard.outputs.skip != 'true'
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          pg_dump -Fc "$NEON_DATABASE_URL" > backup.dump
          gpg --symmetric --cipher-algo AES256 --batch --yes \
              --passphrase "$BACKUP_PASSPHRASE" -o backup.dump.gpg backup.dump
      - name: Upload artefact chiffré (30 j)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ github.run_id }}
          path: backup.dump.gpg
          retention-days: 30

  restore-check:
    runs-on: ubuntu-latest
    needs: backup
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - name: Télécharger l'artefact
        id: dl
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: neon-backup-${{ github.run_id }}
      - name: Restaurer + sanity (si artefact présent)
        if: ${{ hashFiles('backup.dump.gpg') != '' }}
        env:
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          gpg -d --batch --passphrase "$BACKUP_PASSPHRASE" backup.dump.gpg > backup.dump
          PGPASSWORD=postgres pg_restore -h localhost -U postgres -d postgres --no-owner backup.dump || true
          echo "Tables restaurées :"
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "\dt" || true
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres \
            -c "SELECT count(*) AS facts FROM facts_events;" || echo "facts_events absente (dump vide ?)"
