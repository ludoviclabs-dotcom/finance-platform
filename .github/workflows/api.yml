name: API CI

on:
  push:
    paths:
      - "apps/api/**"
  pull_request:
    paths:
      - "apps/api/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify FastAPI app imports
        run: |
          python -c "from main import app; print('OK: app loaded')"

      - name: Verify models import
        run: |
          python -c "from models.ma import MAInput, MAOutput; print('OK: models loaded')"

      - name: Verify services import
        run: |
          python -c "from services.ma_service import compute_ma; print('OK: services loaded')"
