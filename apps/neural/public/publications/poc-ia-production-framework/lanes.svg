  <text x="154" y="454" fill="#10B981" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700">1. Friction</text>
  <text x="154" y="503" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">Identifier une</text>
  <text x="154" y="536" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">latence métier</text>
  <text x="434" y="454" fill="#A78BFA" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700">2. Preuve</text>
  <text x="434" y="503" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">Tester sur un</text>
  <text x="434" y="536" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">échantillon crédible</text>
  <text x="714" y="454" fill="#22D3EE" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700">3. Intégration</text>
  <text x="714" y="503" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">Dessiner le plus</text>
  <text x="714" y="536" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">petit flux complet</text>
  <text x="994" y="454" fill="#F59E0B" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700">4. Adoption</text>
  <text x="994" y="503" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">Former, corriger,</text>
  <text x="994" y="536" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">documenter</text>
  <text x="1274" y="454" fill="#FB7185" font-family="Space Grotesk, Arial, sans-serif" font-size="28" font-weight="700">5. Pilotage</text>
  <text x="1274" y="503" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">Mesurer, étendre,</text>
  <text x="1274" y="536" fill="#D9E3F1" font-family="Inter, Arial, sans-serif" font-size="22">réallouer</text>
  <rect x="124" y="708" width="1370" height="56" rx="28" fill="#0A1425" stroke="#1B304F"/>
  <text x="166" y="744" fill="#A8B9D4" font-family="Inter, Arial, sans-serif" font-size="22">Le passage en production n'est pas un événement unique, mais une chaîne de décisions cohérentes.</text>
