name: Carbon Frontend CI

on:
  push:
    paths:
      - "apps/carbon/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "apps/carbon/**"
      - ".github/workflows/frontend.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/carbon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/carbon/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          AUTH_JWT_SECRET: ci-build-dummy-secret-not-used-at-runtime
