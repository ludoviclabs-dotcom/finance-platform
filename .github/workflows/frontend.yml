name: Carbon Frontend CI

on:
  push:
    paths:
      - "apps/carbon/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "apps/carbon/**"
      - ".github/workflows/frontend.yml"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/carbon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/carbon/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          AUTH_JWT_SECRET: ci-build-dummy-secret-not-used-at-runtime

  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/carbon

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/carbon/package-lock.json

      - run: npm ci

      # Audit bloquant : dépendances de PRODUCTION uniquement (ce qui est réellement
      # déployé). Même intention que l'audit API sur requirements.txt.
      - name: npm audit — production deps (high+critical bloquant)
        run: npm audit --audit-level=high --omit=dev

      # Visibilité non bloquante des avis sur l'outillage de dev (vitest UI,
      # esbuild dev-server, drizzle-kit/@esbuild-kit) — jamais embarqué dans le
      # bundle servi. Affiché dans les logs sans bloquer le merge (ne masque rien).
      - name: npm audit — full incl. dev tooling (informationnel)
        run: npm audit --audit-level=high || true
