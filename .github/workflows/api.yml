name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "apps/api/**"
      - ".github/workflows/api.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install dev tools
        run: pip install ruff

      - name: Lint (ruff)
        run: ruff check . --select=E,F,I --ignore=E501

      - name: Verify FastAPI app loads (all routers)
        run: |
          python -c "
          from main import app
          routes = [r.path for r in app.routes]
          print(f'OK: app loaded with {len(routes)} routes')
          # Verify key route prefixes are registered
          prefixes = {'/health', '/auth', '/excel', '/report', '/clients',
                      '/entreprise', '/cyber', '/pilier2', '/creditrisk',
                      '/carbon', '/vsme', '/esg', '/finance', '/ingest'}
          for p in prefixes:
              assert any(p in r for r in routes), f'Missing route prefix: {p}'
          print(f'OK: all {len(prefixes)} route prefixes verified')
          "

      - name: Verify models import
        run: |
          python -c "from models.ma import MAInput, MAOutput; print('OK: models loaded')"

      - name: Verify services import
        run: |
          python -c "
          from services.ma_service import analyze_ma
          from services.cyber_service import analyze_cyber
          from services.pilier2_service import analyze_pilier2
          from services.creditrisk_service import analyze_creditrisk
          from services.entreprise_service import analyze_entreprise
          print('OK: all services loaded')
          "

  # Job séparé : pytest + Block A indépendants du lint (T1.8).
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Tests (pytest — mode /tmp, sans Neon)
        run: pytest -q
      - name: Block A — validation des classeurs masters
        run: python ../../scripts/carbonco/validate_block_a_workbooks.py --root data

  # Job séparé : tests PostgreSQL du ledger de migrations (PR-02B), contre un
  # conteneur postgres:16 jetable — jamais Neon. Même pattern de service que
  # backup.yml::restore-check (déjà en place). Le job `tests` ci-dessus reste
  # inchangé (mode /tmp, sans DB) et continue de couvrir le reste de la suite.
  migration-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      # PR-02B : ledger + sondes. PR-03 : Evidence Kernel — migration 028
      # réellement appliquée (via les fixtures `build_evidence_kernel_db`)
      # + RLS globale/tenant, triggers d'immutabilité, licence, idempotence.
      # Ces tests sont DB-gated, donc SKIPPÉS dans le job `tests` (mode /tmp,
      # sans DATABASE_URL). Ce job est le SEUL à les exécuter contre un vrai
      # PostgreSQL : ajouter chaque nouveau fichier de test DB-gated ici est
      # obligatoire, sinon il ne tourne jamais en CI (chacun construit son
      # propre schéma de façon idempotente — aucun ordre imposé entre eux).
      # `test_energy_rls_non_superuser.py` fait exception au « superuser » de ce
      # job : il crée un rôle NOSUPERUSER/NOBYPASSRLS, lui transfère la propriété
      # des tables énergie et de la fonction trigger, puis rejoue le parcours en
      # SET LOCAL ROLE. C'est le seul test qui exerce réellement FORCE ROW LEVEL
      # SECURITY (cf. docs/carbonco/refonte/ENERGY_RLS_NON_SUPERUSER_HARDENING.md).
      # `test_energy_allocation_concurrency.py` (Wave 3, migration 035) exerce le
      # verrou FOR UPDATE de energy_allocation_guard() avec de VRAIES connexions
      # concurrentes (2 threads) — indépendant de la RLS, donc valable même sous
      # le rôle superuser de ce job (cf. docs/carbonco/refonte/WAVE_3_STABILIZATION_TRACEABILITY.md).
      # PR-08 (géospatial & eau) : `test_water_schema_not_ready.py` doit rester
      # EN DERNIER — il RÉINITIALISE le schéma public à un état pré-036
      # (reset + 001-035) pour prouver le 503 `schema_not_ready` ; le placer
      # avant un module qui suppose 036/037 casserait ce module-là.
      # PR-09 (biodiversité & LEAP) : `test_nature_schema_not_ready.py` réinitialise
      # à son tour le schéma, DEUX fois (pré-038 : reset + 001-037 ; pré-039 :
      # reset + 001-038) — il doit rester APRÈS `test_water_schema_not_ready.py`
      # ET après `test_nature_assess_prepare.py` (qui suppose 039 posée) — même
      # contrainte d'ordre, les resets ne se gênent pas tant qu'ils restent
      # groupés en DERNIER.
      # PR-10 (IRO / double matérialité) : les 5 fichiers `test_iro*.py` sont
      # des tests DB-gated NORMAUX (chacun construit son propre schéma de façon
      # idempotente jusqu'à 040, aucun reset) — ajoutés APRÈS
      # `test_nature_assess_prepare.py` et AVANT les modules
      # `*_schema_not_ready.py`, qui doivent rester groupés en tout dernier.
      # `test_water_schema_not_ready.py` se retrouve de ce fait après
      # `test_nature_ledger.py`/`test_nature_assess_prepare.py` plutôt
      # qu'immédiatement après `test_water_screening_api.py` comme avant
      # PR-10 — sans conséquence, chaque module DB-gated reconstruit lui-même
      # tout le schéma dont il a besoin (apply_upto est idempotent, CREATE
      # TABLE IF NOT EXISTS), aucun module « normal » ne dépend de l'état
      # laissé par le précédent.
      - name: Tests PostgreSQL — ledger + Evidence Kernel + Source Admin + Procurement + Énergie + RLS non-superuser + Scope 3 + Moteur Scope 2 + CRMA + Wave 3 + Géospatial/Eau + Biodiversité/LEAP + IRO (PR-02B / PR-03 / PR-04 / PR-05A / PR-06A / PR-05B / PR-06B / PR-07 / Wave 3 / PR-08 / PR-09 / PR-10)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
        run: >-
          pytest -q
          tests/test_migration_probes.py
          tests/test_migration_ledger.py
          tests/test_intelligence_sources.py
          tests/test_intelligence_releases.py
          tests/test_intelligence_observations.py
          tests/test_intelligence_api.py
          tests/test_intelligence_adapters.py
          tests/test_snapshot_migration.py
          tests/test_intelligence_freshness.py
          tests/test_claim_links.py
          tests/test_procurement_imports.py
          tests/test_procurement_bom.py
          tests/test_procurement_declarations.py
          tests/test_energy_meters.py
          tests/test_energy_instruments.py
          tests/test_energy_import.py
          tests/test_energy_rls_non_superuser.py
          tests/test_energy_allocation_concurrency.py
          tests/test_procurement_calculation.py
          tests/test_procurement_hotspots.py
          tests/test_procurement_scoring.py
          tests/test_procurement_evidence_pack.py
          tests/test_scope2_runs.py
          tests/test_crma_reference.py
          tests/test_crma_exposure.py
          tests/test_crma_article24.py
          tests/test_sites_geo.py
          tests/test_water_ledger.py
          tests/test_water_screening_api.py
          tests/test_nature_ledger.py
          tests/test_nature_assess_prepare.py
          tests/test_iro.py
          tests/test_impact_assessments.py
          tests/test_financial_assessments.py
          tests/test_materiality_decisions.py
          tests/test_iro_actions.py
          tests/test_ai_review_ledger.py
          tests/test_demo_seed.py
          tests/test_water_schema_not_ready.py
          tests/test_nature_schema_not_ready.py

  security-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (high+critical bloquant)
        # PYSEC-2026-1325 (ecdsa 0.19.2) — ignoré avec justification (2026-07-17) :
        #  - dépendance transitive via python-jose[cryptography], jamais déclarée
        #    directement dans requirements.txt ;
        #  - aucune version corrective publiée (colonne "Fix Versions" vide) ;
        #  - canal auxiliaire temporel sur des opérations ECDSA. L'app signe ses JWT
        #    en HS256 uniquement (services/auth_service.py) → le chemin ECDSA n'est
        #    jamais exercé ; plateforme locale-first, sans exposition réseau au runtime.
        #  À retirer si un correctif ecdsa paraît, ou lors d'une migration python-jose → PyJWT.
        run: pip-audit -r requirements.txt --strict --ignore-vuln PYSEC-2026-1325
